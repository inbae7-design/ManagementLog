<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 스마트 영농일지</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2e4d2e">
    <link rel="apple-touch-icon" href="/icon.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-card { max-width: 400px; width: 100%; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; }
        .header-bg { background: linear-gradient(135deg, #2e4d2e 0%, #38a169 100%); border-radius: 20px 20px 0 0; padding: 2rem 1rem; color: white; text-align: center; }
        .install-box { border: 2px dashed #a3b8a3; background-color: #f9fbf9; }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="header-bg">
        <h1 class="display-1 mb-2">🥒</h1>
        <h4 class="fw-bold mb-0">오이연구회 영농일지</h4>
    </div>
    <div class="card-body p-4">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger py-2 text-center fw-bold small">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <input type="text" class="form-control form-control-lg bg-light border-secondary" name="username" placeholder="아이디" required>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control form-control-lg bg-light border-secondary" name="password" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm mb-3" style="background-color: #38a169; border: none;">로그인</button>
            <div class="text-center mb-2">
                <a href="/register" class="text-secondary text-decoration-none small">처음이신가요? <b class="text-dark">회원가입</b></a>
            </div>
        </form>

        <div id="installContainer" class="install-box p-3 rounded text-center mt-4">
            <h6 class="fw-bold text-success mb-1" style="font-size: 0.95rem;">📱 앱으로 더 편리하게!</h6>
            <p class="text-muted mb-3" style="font-size: 0.75rem;">주소창 없이 폰 화면에 앱을 설치해 사용하세요.</p>
            
            <button id="installAppBtn" class="btn btn-sm btn-success fw-bold rounded-pill px-4 shadow-sm mb-2" style="display: none;">
                ⬇️ 홈 화면에 앱 자동 설치하기
            </button>

            <div id="installGuide" class="text-start mx-auto text-secondary" style="font-size: 0.75rem; max-width: 250px; line-height: 1.6;">
                <span class="fw-bold text-dark">🍏 아이폰 (Safari):</span><br>하단 <b>[공유 <span class="fs-6">⍐</span>]</b> 버튼 ➔ <b>[홈 화면에 추가]</b><br>
                <div class="mt-2"></div>
                <span class="fw-bold text-dark">🤖 안드로이드 (Chrome):</span><br>우측 상단 <b>[⁝]</b> 메뉴 ➔ <b>[홈 화면에 추가]</b>
            </div>
        </div>

    </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('Service Worker Registered'));
  }

  let deferredPrompt;
  const installBtn = document.getElementById('installAppBtn');
  const installGuide = document.getElementById('installGuide');
  const installContainer = document.getElementById('installContainer');

  // 설치 팝업을 띄울 수 있는 기기(주로 안드로이드)인 경우
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // 설치 버튼은 보여주고 수동 가이드 글씨는 숨김
    installBtn.style.display = 'inline-block';
    installGuide.style.display = 'none';
  });

  // 버튼 클릭 시 설치 창 띄우기
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt !== null) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installContainer.style.display = 'none';
        }
        deferredPrompt = null;
    }
  });

  // 바탕화면에 이미 설치되어서 앱으로 실행 중인 경우 설치 안내창 전체를 안 보이게 숨김
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      installContainer.style.display = 'none';
  }
</script>
</body>
</html>
