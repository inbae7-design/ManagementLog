<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURICS 스마트팜 관제 - 스마트 영농일지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .back-to-journal { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: #1e293b; color: white; padding: 12px 20px; border-radius: 30px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s; }
        .back-to-journal:hover { transform: translateY(-3px); background: #0f172a; }
    </style>
</head>
<body>

    <div id="root">
        <div style="padding: 50px; text-align: center; color: #64748b; font-family: sans-serif;">
            <h2 style="color: #3b82f6; font-size: 24px; margin-bottom: 10px;">🚀 FUTURICS 시스템 로딩 중...</h2>
            <p>화면이 5초 이상 멈춰있다면 아래의 에러 메시지를 확인하여 알려주세요!</p>
            <div id="error-box" style="color: #e53e3e; font-weight: bold; margin-top: 20px; font-size: 14px; background: #fff5f5; padding: 15px; border-radius: 8px; display: none;"></div>
        </div>
    </div>

    <a href="/" class="back-to-journal">🏠 영농일지로 돌아가기</a>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errBox = document.getElementById('error-box');
            if(errBox) {
                errBox.style.display = 'block';
                errBox.innerHTML += `<p>🚨 에러 발생: ${msg} <br/>(줄 번호: ${lineNo})</p>`;
            }
            return false;
        };
    </script>

    <script type="text/babel">
        {% raw %}
        const { useState, useEffect, useRef, useMemo } = React;

        // ✨ 차트 엔진이 뻗어도 화면이 하얗게 되지 않도록 안전장치 장착!
        const rechartsObj = window.Recharts || {};
        const { ComposedChart, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, BarChart, Bar } = rechartsObj;

        // 회장님의 5173 포트 적용 완료!
        const MY_SERVER_URL = "/api/proxy";
        const ZONES = Array.of("1동", "2동", "3동", "4동", "작업장");
        const ZONE_COLORS = { "1동": "#0ea5e9", "2동": "#10b981", "3동": "#f59e0b", "4동": "#8b5cf6", "작업장": "#f43f5e" };

        const initMotor = () => ({ state: 'stop', percent: 0, target: null, duration: 60 });
        const defaultMotors = {
          side1L: initMotor(), side1R: initMotor(), side2L: initMotor(), side2R: initMotor(),
          side3L: initMotor(), side3R: initMotor(), side4L: initMotor(), side4R: initMotor(),
          roof: initMotor(), shade: initMotor()
        };
        const defaultRelays = { fan: false, exhaust: false, heater: false };

        const getTodayDate = () => {
          const d = new Date();
          d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
          return d.toISOString().split('T');
        };

        const LoginView = ({ onLogin }) => {
          const [password, setPassword] = useState('');
          const [error, setError] = useState(false);
          const handleLogin = (e) => {
            e.preventDefault();
            if (password === '7777') onLogin(true);
            else { setError(true); setPassword(''); }
          };
          return (
            <div className="flex flex-col items-center justify-center h-full gap-8 z-10 animate-fadeIn bg-slate-50 min-h-screen">
              <div className="text-center mb-4 mt-10">
                <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500 mb-2" style={{filter: 'drop-shadow(0 0 10px rgba(16,185,129,0.3))'}}>FUTURICS</h1>
                <p className="text-emerald-600 text-xs font-bold" style={{letterSpacing: '0.3em'}}>SMART FARM OS</p>
              </div>
              <form onSubmit={handleLogin} className="bg-white p-8 rounded-3xl border border-emerald-100 flex flex-col gap-6 w-full max-w-sm shadow-2xl mx-4">
                <div className="text-center"><span className="text-5xl">🥒</span><h2 className="text-slate-800 font-bold mt-4 text-xl">스마트팜 시스템 로그인</h2></div>
                <div>
                  <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="비밀번호 입력" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 text-emerald-600 font-bold text-center text-xl focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all" style={{letterSpacing: '0.2em'}} />
                  {error && <p className="text-rose-500 text-xs text-center mt-3 font-bold animate-pulse">비밀번호가 일치하지 않습니다.</p>}
                </div>
                <button type="submit" className="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-black text-lg rounded-xl shadow-md active:scale-95 transition-all">농장 접속하기</button>
              </form>
            </div>
          );
        };

        const PageHeader = ({ title, onChangeView, currentView, onLogout }) => {
          const navItems = Array.of(
            { id: 'monitor', name: '모니터링', icon: '📊' },
            { id: 'remote', name: '환경제어', icon: '⚙️' },
            { id: 'irrigation', name: '관수제어', icon: '💧' },
            { id: 'data', name: '데이터', icon: '📈' },
            { id: 'cctv', name: 'CCTV', icon: '📹' }
          );
          return (
            <header className="flex flex-col xl:flex-row justify-between items-center border-b border-emerald-100 pb-4 mb-4 shrink-0 gap-4 bg-slate-50 z-20">
              <div className="flex items-center gap-4 w-full xl:w-auto justify-between xl:justify-start">
                <button onClick={() => onChangeView('home')} className="px-3 py-1.5 bg-white border border-emerald-200 text-emerald-600 hover:bg-emerald-50 font-bold rounded-lg text-xs shadow-sm transition-colors">HOME</button>
                <h1 className="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 whitespace-nowrap">{title}</h1>
              </div>
              <div className="flex gap-2 w-full xl:w-auto overflow-x-auto no-scrollbar items-center py-1">
                {navItems.map((item) => (
                  <button key={item.id} onClick={() => onChangeView(item.id)} style={{fontSize: '11px'}} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 rounded-xl font-bold transition-all shadow-sm ${currentView === item.id ? 'bg-emerald-500 text-white shadow-emerald-500/30' : 'bg-white text-slate-500 border border-slate-200 hover:bg-emerald-50 hover:text-emerald-600'}`}>{item.icon} {item.name}</button>
                ))}
                {onLogout && <button onClick={onLogout} style={{fontSize: '10px'}} className="whitespace-nowrap px-3 py-2 rounded-xl font-bold bg-rose-50 text-rose-500 border border-rose-200 hover:bg-rose-100 ml-2 shadow-sm transition-colors">종료</button>}
              </div>
            </header>
          );
        };

        const PrecisionMotorCard = ({ id, label, motor, isDisabled, onMotorAction, onTargetSet, onDurationChange }) => {
          const [targetInput, setTargetInput] = useState("");
          const [durationInput, setDurationInput] = useState(motor.duration.toString());
          const pct = Math.round(motor.percent);

          useEffect(() => { setDurationInput(motor.duration.toString()); }, Array.of(motor.duration));

          const handleTargetGo = () => {
            if (isDisabled) return alert("자동 모드 가동 중입니다.");
            const val = parseInt(targetInput);
            if (isNaN(val) || val < 0 || val > 100) return alert("0에서 100 사이의 숫자를 입력해주세요.");
            onTargetSet(id, val);
            setTargetInput("");
          };

          const handleDurationTyping = (e) => {
            setDurationInput(e.target.value);
            const val = parseInt(e.target.value);
            if (!isNaN(val) && val > 0) onDurationChange(id, val);
          };

          return (
            <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200 flex flex-col gap-2 w-full">
              <div className="flex justify-between items-end">
                <span className={`font-bold ${isDisabled ? 'text-slate-400' : 'text-slate-600'}`} style={{fontSize: '10px'}}>{label}</span>
                <span className={`text-xs font-black ${motor.state === 'open' ? 'text-emerald-500' : motor.state === 'close' ? 'text-rose-500' : 'text-teal-600'}`}>
                  {pct}% {motor.target !== null ? `(목표:${motor.target}%)` : ''}
                </span>
              </div>
              <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden border border-slate-300 relative">
                <div className={`h-full transition-all ${motor.state === 'close' ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${motor.percent}%` }}></div>
              </div>
              <div className="flex gap-1 mt-1">
                <button onClick={()=>onMotorAction(id, 'open')} disabled={isDisabled} style={{fontSize: '10px'}} className={`flex-1 py-1.5 rounded font-black transition-all ${motor.state==='open' ? 'bg-emerald-500 text-white shadow-md':'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}>열림</button>
                <button onClick={()=>onMotorAction(id, 'stop')} disabled={isDisabled} style={{fontSize: '10px'}} className={`flex-1 py-1.5 rounded font-black transition-all ${motor.state==='stop' ? 'bg-slate-500 text-white shadow-md':'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}>정지</button>
                <button onClick={()=>onMotorAction(id, 'close')} disabled={isDisabled} style={{fontSize: '10px'}} className={`flex-1 py-1.5 rounded font-black transition-all ${motor.state==='close' ? 'bg-rose-500 text-white shadow-md':'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}>닫힘</button>
              </div>
              <div className="flex items-center gap-1 mt-1 border-t border-slate-200 pt-2">
                <div className="flex items-center bg-white border border-slate-200 rounded px-1 flex-1">
                  <span className="text-slate-400 mr-1 whitespace-nowrap" style={{fontSize: '8px'}}>시간</span>
                  <input type="number" value={durationInput} onChange={handleDurationTyping} disabled={isDisabled} style={{fontSize: '10px'}} className="w-8 bg-transparent text-teal-600 font-bold text-center focus:outline-none" />
                </div>
                <div className="flex items-center bg-white border border-slate-200 rounded px-1 flex-1">
                  <span className="text-slate-400 mr-1 whitespace-nowrap" style={{fontSize: '8px'}}>목표</span>
                  <input type="number" min="0" max="100" placeholder={pct.toString()} value={targetInput} onChange={e=>setTargetInput(e.target.value)} disabled={isDisabled} style={{fontSize: '10px'}} className="w-8 bg-transparent text-blue-500 font-bold text-center focus:outline-none" />
                </div>
                <button onClick={handleTargetGo} disabled={isDisabled} style={{fontSize: '9px'}} className="bg-blue-500 text-white px-2 py-1 rounded font-bold hover:bg-blue-600 shrink-0">이동</button>
              </div>
            </div>
          );
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [currentView, setCurrentView] = useState('home');
          const [sensorData, setSensorData] = useState({});
          const sensorDataRef = useRef({});

          const [farmSettings, setFarmSettings] = useState({
            farmName: '김인배',
            surveyor: '김인배'
          });

          const [zoneStates, setZoneStates] = useState(() => {
            const initial = {};
            ZONES.forEach(z => {
              Reflect.set(initial, z, {
                mode: 'manual',
                motors: { ...defaultMotors },
                relays: { ...defaultRelays },
                autoConfig: { targetTemp: 25, closeTemp: 18, rainProtect: true, windProtect: true },
                autoPercent: 0, autoStartTime: null, lastOpenTime: null, lastCloseTime: null
              });
            });
            return initial;
          });

          useEffect(() => {
            const fetchData = async () => {
              try {
                const res = await fetch(`${MY_SERVER_URL}/api/sensors`);
                const data = await res.json();
                if (data) { setSensorData(data); sensorDataRef.current = data; }
              } catch (e) {}
            };
            fetchData();
            const itv = setInterval(fetchData, 2000);
            return () => clearInterval(itv);
          }, Array.of());

          useEffect(() => {
            const tickMs = 1000;
            const motorEngine = setInterval(() => {
              setZoneStates(prevZones => {
                let nextZones = { ...prevZones };
                let hasChanges = false;
                const now = Date.now();

                ZONES.forEach(z => {
                  const zone = Reflect.get(nextZones, z);
                  const sData = Reflect.get(sensorDataRef.current, z);
                  const temp = sData ? sData.temp : 0;
                  let newMotors = { ...zone.motors };
                  let zoneChanged = false;

                  if (zone.mode === 'auto' && zone.autoStartTime && (now - zone.autoStartTime >= 10000)) {
                    let targetPct = 0;
                    if (temp >= zone.autoConfig.targetTemp) targetPct = Math.min(100, Math.floor(temp - zone.autoConfig.targetTemp) * 10 + 10);
                    else if (temp <= zone.autoConfig.closeTemp) targetPct = 0;
                    else targetPct = newMotors.side1L.target !== null ? newMotors.side1L.target : newMotors.side1L.percent;

                    if (newMotors.side1L.target !== targetPct) {
                      newMotors.side1L.target = targetPct; newMotors.side1R.target = targetPct; zoneChanged = true;
                    }
                  }

                  Object.keys(newMotors).forEach(mId => {
                    let m = { ...Reflect.get(newMotors, mId) };
                    let mChanged = false;
                    if (m.target !== null) {
                      if (Math.abs(m.percent - m.target) < 1) { m.percent = m.target; m.state = 'stop'; m.target = null; mChanged = true; }
                      else if (m.percent < m.target && m.state !== 'open') { m.state = 'open'; mChanged = true; }
                      else if (m.percent > m.target && m.state !== 'close') { m.state = 'close'; mChanged = true; }
                    }
                    if (m.state === 'open' && m.percent < 100) { m.percent += (100 / m.duration) * (tickMs / 1000); if (m.percent >= 100) { m.percent = 100; m.state = 'stop'; m.target = null; } mChanged = true; }
                    else if (m.state === 'close' && m.percent > 0) { m.percent -= (100 / m.duration) * (tickMs / 1000); if (m.percent <= 0) { m.percent = 0; m.state = 'stop'; m.target = null; } mChanged = true; }
                    if (mChanged) { Reflect.set(newMotors, mId, m); zoneChanged = true; }
                  });
                  if (zoneChanged) { hasChanges = true; Reflect.set(nextZones, z, { ...zone, motors: newMotors }); }
                });
                return hasChanges ? nextZones : prevZones;
              });
            }, 1000);
            return () => clearInterval(motorEngine);
          }, Array.of());

          const handleLogout = () => { setIsLoggedIn(false); setCurrentView('home'); };

          if (!isLoggedIn) return (<div className="h-screen w-full bg-slate-50 text-slate-800 p-4 select-none"><LoginView onLogin={setIsLoggedIn} /></div>);

          return (
            <div className="h-screen w-full bg-slate-50 text-slate-800 overflow-hidden flex flex-col relative font-sans p-2 md:p-4 select-none">
              <div className="relative z-10 flex-grow flex flex-col h-full">
                {currentView === 'home' && <HomeView onChangeView={setCurrentView} onLogout={handleLogout} farmSettings={farmSettings} setFarmSettings={setFarmSettings} />}
                {currentView === 'monitor' && <MonitorView onChangeView={setCurrentView} onLogout={handleLogout} sensorData={sensorData} />}
                {currentView === 'remote' && <EnvironmentControlView onChangeView={setCurrentView} onLogout={handleLogout} zoneStates={zoneStates} setZoneStates={setZoneStates} sensorData={sensorData} />}
                {currentView === 'irrigation' && <IrrigationView onChangeView={setCurrentView} onLogout={handleLogout} />}
                {currentView === 'data' && <DataAnalysisView onChangeView={setCurrentView} onLogout={handleLogout} farmSettings={farmSettings} />}
                {currentView === 'cctv' && <CCTVView onChangeView={setCurrentView} onLogout={handleLogout} />}
              </div>
            </div>
          );
        }

        const HomeView = ({ onChangeView, onLogout, farmSettings, setFarmSettings }) => (
          <div className="flex flex-col items-center justify-center h-full gap-6 text-center overflow-y-auto no-scrollbar py-10 min-h-screen">
            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500 drop-shadow-sm">FUTURICS</h1>
            <p className="text-emerald-600 text-xs font-bold" style={{letterSpacing: '0.3em'}}>SMART FARM OS FINAL</p>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 w-full max-w-2xl px-4 mt-4">
              <button onClick={() => onChangeView('monitor')} className="py-6 bg-white border border-emerald-100 rounded-3xl text-sm font-bold text-slate-700 hover:border-emerald-300 hover:shadow-md shadow-sm flex flex-col items-center gap-2 transition-all"><span className="text-3xl">📊</span> 모니터링</button>
              <button onClick={() => onChangeView('remote')} className="py-6 bg-white border border-emerald-100 rounded-3xl text-sm font-bold text-slate-700 hover:border-emerald-300 hover:shadow-md shadow-sm flex flex-col items-center gap-2 transition-all"><span className="text-3xl">⚙️</span> 환경제어</button>
              <button onClick={() => onChangeView('irrigation')} className="py-6 bg-white border border-emerald-100 rounded-3xl text-sm font-bold text-slate-700 hover:border-emerald-300 hover:shadow-md shadow-sm flex flex-col items-center gap-2 transition-all"><span className="text-3xl">💧</span> 관수제어</button>
              <button onClick={() => onChangeView('data')} className="py-6 bg-white border border-emerald-100 rounded-3xl text-sm font-bold text-slate-700 hover:border-emerald-300 hover:shadow-md shadow-sm flex flex-col items-center gap-2 transition-all"><span className="text-3xl">📈</span> 데이터 분석</button>
              <button onClick={() => onChangeView('cctv')} className="py-6 bg-white border border-emerald-100 rounded-3xl text-sm font-bold text-slate-700 hover:border-emerald-300 hover:shadow-md shadow-sm flex flex-col items-center gap-2 transition-all"><span className="text-3xl">📹</span> CCTV</button>
            </div>

            <div className="mt-8 bg-white border border-emerald-100 p-6 rounded-3xl w-full max-w-2xl text-left shadow-sm mx-auto mb-10">
              <h3 className="text-emerald-600 font-bold text-sm mb-4">⚙️ 사용자 설정 (농가 현황)</h3>
              <div className="flex gap-4">
                <div className="flex-1">
                  <label className="text-xs text-slate-500 block mb-1 font-bold">기본 농가명</label>
                  <input type="text" value={farmSettings.farmName} onChange={e=>setFarmSettings({...farmSettings, farmName: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 focus:outline-none transition-all" />
                </div>
                <div className="flex-1">
                  <label className="text-xs text-slate-500 block mb-1 font-bold">기본 조사자</label>
                  <input type="text" value={farmSettings.surveyor} onChange={e=>setFarmSettings({...farmSettings, surveyor: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 focus:outline-none transition-all" />
                </div>
              </div>
            </div>
          </div>
        );

        const MonitorView = ({ onChangeView, onLogout, sensorData }) => {
          const [weather, setWeather] = useState({ temp: 24.5, hum: 60, ws: 1.2, desc: "맑음" });
          const [visibleZones, setVisibleZones] = useState({ "1동":true, "2동":true, "3동":true, "4동":true, "작업장":true });

          return (
            <div className="h-screen flex flex-col bg-slate-50 pb-20 p-2 md:p-4">
              <PageHeader title="📊 실시간 모니터링" onChangeView={onChangeView} currentView="monitor" onLogout={onLogout} />
              <div className="flex-grow overflow-y-auto no-scrollbar flex flex-col gap-4">
                <div className="bg-white rounded-2xl border border-emerald-100 p-4 flex flex-col gap-3 shadow-sm relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-full blur-2xl -mr-10 -mt-10"></div>
                  <div className="flex justify-between items-center relative z-10">
                    <div className="flex flex-col"><span className="text-emerald-600 font-bold text-xs flex items-center gap-1">📡 안성 실시간 날씨 (가상)</span><span className="text-4xl font-black text-slate-800 mt-1">{weather.temp}°C</span></div>
                    <div className="text-right flex flex-col items-end"><span className="text-emerald-600 font-black text-lg mb-1 bg-emerald-50 px-3 py-1 rounded-full">{weather.desc}</span></div>
                  </div>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                  {ZONES.map(z => {
                     const sData = Reflect.get(sensorData, z) || {temp:0, hum:0};
                     return (
                      <div key={z} className={`p-3 rounded-xl flex flex-col relative overflow-hidden shadow-sm transition-all border bg-white border-slate-200`}>
                        <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: Reflect.get(ZONE_COLORS, z)}}></div>
                        <span className="text-xs font-bold text-slate-600 mb-2 mt-1">{z}</span>
                        <div className="flex justify-between items-end">
                          <div><p className="text-slate-400 font-bold" style={{fontSize: '10px'}}>온도</p><p className="text-xl font-black text-rose-500">{sData.temp ? Number(sData.temp).toFixed(1) : "0.0"}<span className="font-bold" style={{fontSize: '10px'}}>°C</span></p></div>
                          <div className="text-right"><p className="text-slate-400 font-bold" style={{fontSize: '10px'}}>습도</p><p className="text-sm font-bold text-blue-500">{sData.hum ? Number(sData.hum).toFixed(0) : "0"}%</p></div>
                        </div>
                      </div>
                     );
                  })}

                  </div>

        const EnvironmentControlView = ({ onChangeView, onLogout, zoneStates, setZoneStates, sensorData }) => {
          const [selectedZone, setSelectedZone] = useState('1동');
          const currentZone = Reflect.get(zoneStates, selectedZone);

          const setGlobalControlMode = (mode) => {
            setZoneStates(prev => {
              let nextStates = { ...prev };
              Array.of('1동', '2동', '3동', '4동').forEach(z => {
                const prevZone = Reflect.get(prev, z);
                let resetMotors = { ...prevZone.motors };
                if (mode === 'manual') {
                   Object.keys(resetMotors).forEach(mId => {
                      const rm = { ...Reflect.get(resetMotors, mId), state: 'stop', target: null };
                      Reflect.set(resetMotors, mId, rm);
                   });
                }
                Reflect.set(nextStates, z, { ...prevZone, mode, autoStartTime: mode === 'auto' ? Date.now() : null, motors: resetMotors });
              });
              return nextStates;
            });
          };

          const setGlobalAutoConfig = (key, value) => {
            setZoneStates(prev => {
              let nextStates = { ...prev };
              Array.of('1동', '2동', '3동', '4동').forEach(z => {
                 const pz = Reflect.get(prev, z);
                 const newConf = { ...pz.autoConfig };
                 Reflect.set(newConf, key, value);

          const handleMotorAction = (id, action) => {
            if (currentZone.mode !== 'manual') return alert("전동 일괄 수동 제어 모드에서만 개별 조작이 가능합니다.");
            setZoneStates(prev => {
               const ns = { ...prev };
               const sz = Reflect.get(ns, selectedZone);
               const nm = { ...sz.motors };
               const updatedMotor = { ...Reflect.get(nm, id), state: action, target: null };
               Reflect.set(nm, id, updatedMotor);
               Reflect.set(ns, selectedZone, { ...sz, motors: nm });
               return ns;
            });
          };

          const handleTargetSet = (id, val) => {
            setZoneStates(prev => {
               const ns = { ...prev };
               const sz = Reflect.get(ns, selectedZone);
               const nm = { ...sz.motors };
               const updatedMotor = { ...Reflect.get(nm, id), target: val };
               Reflect.set(nm, id, updatedMotor);
               Reflect.set(ns, selectedZone, { ...sz, motors: nm });
               return ns;
            });
          };

          const handleDurationChange = (id, val) => {
            setZoneStates(prev => {
               const ns = { ...prev };
               const sz = Reflect.get(ns, selectedZone);
               const nm = { ...sz.motors };
               const updatedMotor = { ...Reflect.get(nm, id), duration: val };

          const handleRelay = (id) => {
            if (currentZone.mode !== 'manual') return alert("전동 일괄 수동 제어 모드에서만 개별 조작이 가능합니다.");
            setZoneStates(prev => {
               const ns = { ...prev };
               const sz = Reflect.get(ns, selectedZone);
               const nr = { ...sz.relays };
               Reflect.set(nr, id, !Reflect.get(nr, id));
               Reflect.set(ns, selectedZone, { ...sz, relays: nr });
               return ns;

          };

          const getSideStyle = (motorObj, isLeft) => {
            let shift = (motorObj.percent / 100) * 12;
            let color = '#94a3b8';
            if (motorObj.state === 'open') color = '#10b981';
            else if (motorObj.state === 'close') color = '#f43f5e';
            else if (motorObj.percent > 0) color = '#3b82f6';
            return { transform: `translateX(${isLeft ? -shift : shift}px)`, backgroundColor: color, boxShadow: color !== '#94a3b8' ? `0 0 8px ${color}80` : 'none' };
          };

          const sDataSel = Reflect.get(sensorData, selectedZone);

          return (
            <div className="h-full flex flex-col overflow-hidden bg-slate-50">

                      ))}

                    <div className="flex justify-between px-3 font-bold" style={{fontSize: '10px'}}>
                      <span className="text-slate-500">{selectedZone} 실시간 환경</span>
                      <span className="text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">{sDataSel ? `${sDataSel.temp}°C / ${sDataSel.hum}%` : "로딩중..."}</span>
                    </div>
                  </div>

                  <div className="flex bg-white p-1 rounded-xl border border-emerald-100 shadow-sm w-full md:w-auto h-fit">
                    <button onClick={()=>setGlobalControlMode('manual')} className={`flex-1 px-4 py-2 text-xs font-black rounded-lg transition-all ${currentZone.mode === 'manual' ? 'bg-indigo-500 text-white shadow-md shadow-indigo-500/30' : 'text-slate-500 hover:bg-slate-50'}`}>전동 일괄 수동</button>
                    <button onClick={()=>setGlobalControlMode('auto')} className={`flex-1 px-4 py-2 text-xs font-black rounded-lg transition-all ${currentZone.mode === 'auto' ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/30' : 'text-slate-500 hover:bg-slate-50'}`}>전동 일괄 스마트 자동</button>
                  </div>
                </div>

                <div className="bg-white border border-emerald-100 rounded-3xl p-2 flex flex-col items-center justify-center relative shadow-sm h-40 shrink-0">
                  <span className="absolute top-3 left-4 text-emerald-600 font-black tracking-widest bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100" style={{fontSize: '10px'}}>{selectedZone} SCHEMATIC</span>
                  <div className="relative w-48 h-20 mt-6">
                    <div className={`absolute -top-6 left-1/2 -translate-x-1/2 font-bold ${currentZone.motors.roof.percent > 0 ? 'text-emerald-500' : 'text-slate-400'}`} style={{fontSize: '10px'}}>{Math.round(currentZone.motors.roof.percent)}%</div>
                    <div className={`absolute -top-3 left-1/2 -translate-x-1/2 w-20 h-2 transition-all duration-1000 rounded-full`} style={{transform: `translate(-50%, ${currentZone.motors.roof.percent > 0 ? -4 : 0}px)`, backgroundColor: currentZone.motors.roof.state === 'open' ? '#10b981' : currentZone.motors.roof.state === 'close' ? '#f43f5e' : '#cbd5e1'}}></div>
                    <div className="absolute top-0 w-full h-12 border-t-4 border-l-4 border-r-4 border-slate-300 rounded-t-[50%]"></div>

                    <div className="absolute top-12 w-full h-12 border-l-4 border-r-4 border-b-4 border-slate-300 flex justify-center items-center" style={{gap: '24px'}}>
                      <div className="absolute top-0 -left-6 flex flex-col items-end" style={{gap: '3px'}}>
                        {Array.of(1, 2, 3, 4).map(lvl => {
                           const mL = Reflect.get(currentZone.motors, `side${lvl}L`);
                           return <span key={lvl} className={`font-bold ${mL.percent > 0 ? 'text-emerald-500' : 'text-slate-400'}`} style={{fontSize: '8px'}}>{Math.round(mL.percent)}%</span>
                        })}
                      </div>
                      <div className="absolute top-0 -right-6 flex flex-col items-start" style={{gap: '3px'}}>
                        {Array.of(1, 2, 3, 4).map(lvl => {
                           const mR = Reflect.get(currentZone.motors, `side${lvl}R`);
                           return <span key={lvl} className={`font-bold ${mR.percent > 0 ? 'text-emerald-500' : 'text-slate-400'}`} style={{fontSize: '8px'}}>{Math.round(mR.percent)}%</span>
                        })}
                      </div>

                      {Array.of(1, 2, 3, 4).map(lvl => {
                         const mL = Reflect.get(currentZone.motors, `side${lvl}L`);
                         const mR = Reflect.get(currentZone.motors, `side${lvl}R`);
                         return (
                          <React.Fragment key={lvl}>
                            <div className="absolute top-0 w-1.5 h-10 transition-all duration-1000 rounded-full" style={{...getSideStyle(mL, true), left: `${lvl*4 - 15}px`}}></div>
                            <div className="absolute top-0 w-1.5 h-10 transition-all duration-1000 rounded-full" style={{...getSideStyle(mR, false), right: `${lvl*4 - 15}px`}}></div>
                          </React.Fragment>
                         )
                      })}
                      <span className={`text-2xl ${currentZone.relays.fan ? 'animate-spin opacity-100':'opacity-20 grayscale'} drop-shadow-md`}>🌀</span>
                      <span className={`text-2xl ${currentZone.relays.fan ? 'animate-spin opacity-100':'opacity-20 grayscale'} drop-shadow-md`}>🌀</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="flex-grow overflow-y-auto no-scrollbar pb-10 flex flex-col lg:flex-row gap-4">
                <div className="flex-1 flex flex-col gap-4">
                  <div className="bg-white p-4 rounded-3xl border border-emerald-100 shadow-sm relative">
                    <h3 className="text-emerald-600 font-bold text-xs mb-3 flex items-center gap-2">🪟 {selectedZone} 측창 정밀 제어</h3>
                    {currentZone.mode === 'auto' && (
                      <div className="bg-emerald-50 border border-emerald-200 p-2 rounded-xl mb-3 flex justify-between items-center px-4 shadow-sm">
                        <span className="text-emerald-700 font-bold" style={{fontSize: '10px'}}>🤖 1중 스마트 비례제어 가동중</span>
                      </div>
                    )}
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-3">
                      {Array.of(1, 2, 3, 4).map(level => {
                         const mL = Reflect.get(currentZone.motors, `side${level}L`);
                         const mR = Reflect.get(currentZone.motors, `side${level}R`);
                         return (
                          <div key={level} className="flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <span className="font-black text-slate-600 ml-1" style={{fontSize: '10px'}}>{level}중 측창</span>
                            <div className="flex gap-2">
                              <PrecisionMotorCard id={`side${level}L`} label="좌측" motor={mL} isDisabled={currentZone.mode === 'auto' && level === 1} onMotorAction={handleMotorAction} onTargetSet={handleTargetSet} onDurationChange={handleDurationChange} />
                              <PrecisionMotorCard id={`side${level}R`} label="우측" motor={mR} isDisabled={currentZone.mode === 'auto' && level === 1} onMotorAction={handleMotorAction} onTargetSet={handleTargetSet} onDurationChange={handleDurationChange} />
                            </div>
                          </div>
                         )
                      })}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="bg-white p-4 rounded-3xl border border-emerald-100 shadow-sm">
                      <h3 className="text-emerald-600 font-bold text-xs mb-3">⏫ 천창/스크린 제어</h3>
                      <div className="flex flex-col gap-2">
                        <PrecisionMotorCard id="roof" label="천창(환기)" motor={currentZone.motors.roof} isDisabled={false} onMotorAction={handleMotorAction} onTargetSet={handleTargetSet} onDurationChange={handleDurationChange} />
                        <PrecisionMotorCard id="shade" label="차광막" motor={currentZone.motors.shade} isDisabled={false} onMotorAction={handleMotorAction} onTargetSet={handleTargetSet} onDurationChange={handleDurationChange} />
                      </div>
                    </div>
                    <div className="bg-white p-4 rounded-3xl border border-emerald-100 shadow-sm">
                      <h3 className="text-emerald-600 font-bold text-xs mb-3">⚡ 공조 기기 전원</h3>
                      <div className="grid grid-cols-3 gap-2">
                        <button onClick={()=>handleRelay('fan')} className={`flex flex-col items-center justify-center p-3 rounded-2xl border transition-all h-20 ${currentZone.relays.fan ? 'bg-blue-50 border-blue-300 shadow-sm text-blue-600' : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100'}`}><span className={`text-2xl mb-1 ${currentZone.relays.fan ? 'animate-spin' : 'grayscale'}`}>🌀</span><span className="font-bold" style={{fontSize: '10px'}}>유동팬</span></button>
                        <button onClick={()=>handleRelay('exhaust')} className={`flex flex-col items-center justify-center p-3 rounded-2xl border transition-all h-20 ${currentZone.relays.exhaust ? 'bg-teal-50 border-teal-300 shadow-sm text-teal-600' : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100'}`}><span className={`text-2xl mb-1 ${currentZone.relays.exhaust ? '' : 'grayscale'}`}>💨</span><span className="font-bold" style={{fontSize: '10px'}}>환풍기</span></button>
                        <button onClick={()=>handleRelay('heater')} className={`flex flex-col items-center justify-center p-3 rounded-2xl border transition-all h-20 ${currentZone.relays.heater ? 'bg-rose-50 border-rose-300 shadow-sm text-rose-600' : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100'}`}><span className={`text-2xl mb-1 ${currentZone.relays.heater ? '' : 'grayscale'}`}>🔥</span><span className="font-bold" style={{fontSize: '10px'}}>온풍기</span></button>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="w-full lg:w-96 shrink-0 flex flex-col gap-4">
                  <div className="bg-white p-6 rounded-3xl border border-emerald-200 shadow-md h-full relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-40 h-40 bg-emerald-50 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
                    <h3 className="text-emerald-700 font-bold text-sm mb-6 flex justify-between items-center relative z-10"><span>🤖 전동 일괄 프로토콜 설정</span></h3>
                    <div className="space-y-6 relative z-10">
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div className="flex justify-between font-bold text-slate-500 mb-3 uppercase tracking-wider" style={{fontSize: '10px'}}><span>개방 목표 온도 (1중 작동)</span> <span className="text-rose-500 text-sm bg-white px-2 py-0.5 rounded border border-slate-200">{currentZone.autoConfig.targetTemp}°C</span></div>
                        <input type="range" min="15" max="35" value={currentZone.autoConfig.targetTemp} onChange={e=>setGlobalAutoConfig('targetTemp', e.target.value)} className="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer" />
                      </div>
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div className="flex justify-between font-bold text-slate-500 mb-3 uppercase tracking-wider" style={{fontSize: '10px'}}><span>보온 닫힘 온도</span> <span className="text-blue-500 text-sm bg-white px-2 py-0.5 rounded border border-slate-200">{currentZone.autoConfig.closeTemp}°C</span></div>
                        <input type="range" min="5" max="25" value={currentZone.autoConfig.closeTemp} onChange={e=>setGlobalAutoConfig('closeTemp', e.target.value)} className="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const IrrigationView = ({ onChangeView, onLogout }) => {
          const [deviceStates, setDeviceStates] = useState({ supply: false, irrigate: false, mixer: false, nutA: false, nutB: false, nutC: false, nutD: false, zoneA: false, zoneB: false });
          const [autoSettings, setAutoSettings] = useState({ duration: 60, useNutA: true, useNutB: true, useNutC: false, useNutD: false });
          const [timeLeft, setTimeLeft] = useState(0);
          const [isRunning, setIsRunning] = useState(false);
          const [irrigationCount, setIrrigationCount] = useState(0);
          const [statusMsg, setStatusMsg] = useState("대기 중");
          const isRunningRef = useRef(false);

          const [manualTimerInputs, setManualTimerInputs] = useState({ supply: 5, mixer: 5, irrigate: 5 });
          const [activeTimers, setActiveTimers] = useState({ supply: 0, mixer: 0, irrigate: 0 });

          const sleep = (ms) => new Promise(res => setTimeout(res, ms));

          useEffect(() => {
            const interval = setInterval(() => {
              setActiveTimers(prev => {
                let updated = { ...prev };
                let hasChanges = false;

                Array.of('supply', 'mixer', 'irrigate').forEach(key => {
                  if (Reflect.get(updated, key) > 0) {
                    Reflect.set(updated, key, Reflect.get(updated, key) - 1);
                    hasChanges = true;
                    if (Reflect.get(updated, key) === 0) {
                      setDeviceStates(ds => {
                        const nds = {...ds};
                        Reflect.set(nds, key, false);
                        return nds;
                      });
                    }
                  }
                });

                return hasChanges ? updated : prev;
              });
            }, 1000);
            return () => clearInterval(interval);
          }, Array.of());

          const toggleDeviceManual = (id) => {
            if (isRunningRef.current) return alert("현재 1회 자동 관수 가동 중에는 수동 조작이 불가능합니다.");
            setDeviceStates(p => {
               const nextState = !Reflect.get(p, id);
               if (!nextState && (id === 'supply' || id === 'mixer' || id === 'irrigate')) {
                  setActiveTimers(timers => {
                    const nt = {...timers};
                    Reflect.set(nt, id, 0);
                    return nt;
                  });
               }
               const np = { ...p };
               Reflect.set(np, id, nextState);
               return np;
            });
          };

          const startManualTimer = (id) => {
            const mins = parseInt(Reflect.get(manualTimerInputs, id));
            if (isNaN(mins) || mins <= 0) return alert("작동할 시간(분)을 정확히 입력하세요.");
            if (isRunningRef.current) return alert("현재 1회 자동 관수 가동 중에는 개별 타이머를 켤 수 없습니다.");

            setDeviceStates(prev => {
              const np = {...prev};
              Reflect.set(np, id, true);
              return np;
            });
            setActiveTimers(prev => {
              const nt = {...prev};
              Reflect.set(nt, id, mins * 60);
              return nt;
            });
          };

          const recordIrrigation = async (zone, duration) => {
            try {
              await fetch(`${MY_SERVER_URL}/api/irrigation`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ zone, duration })
              });
            } catch(e) {}
          };

          const runSequence = async () => {
            if (isRunningRef.current) {
              isRunningRef.current = false; setIsRunning(false);
              setDeviceStates({supply:false, irrigate:false, mixer:false, nutA:false, nutB:false, nutC:false, nutD:false, zoneA:false, zoneB:false});
              setStatusMsg("시스템 강제 종료됨"); setTimeLeft(0); return;
            }
            isRunningRef.current = true; setIsRunning(true);
            for (const zone of Array.of('zoneA', 'zoneB')) {
              if (!isRunningRef.current) break;
              setStatusMsg(`${zone === 'zoneA' ? 'A구역' : 'B구역'} 시작 (양액 투입)`);
              setDeviceStates(p => ({ ...p, mixer: true, nutA: autoSettings.useNutA, nutB: autoSettings.useNutB, nutC: autoSettings.useNutC, nutD: autoSettings.useNutD }));
              await sleep(1000); if (!isRunningRef.current) break;
              setStatusMsg(`${zone === 'zoneA' ? 'A구역' : 'B구역'} 밸브 개방`);
              setDeviceStates(p => { const np = {...p}; Reflect.set(np, zone, true); return np; });
              await sleep(1000); if (!isRunningRef.current) break;
              setStatusMsg(`${zone === 'zoneA' ? 'A구역' : 'B구역'} 관수 진행 중...`);
              setDeviceStates(p => ({...p, irrigate: true}));

              let count = parseInt(autoSettings.duration); setTimeLeft(count);
              for(let i=0; i<count; i++) { if(!isRunningRef.current) break; await sleep(1000); setTimeLeft(p => p - 1); }
              if (!isRunningRef.current) break;

              recordIrrigation(zone === 'zoneA' ? '1동' : '2동', parseInt(autoSettings.duration));

              setStatusMsg(`${zone === 'zoneA' ? 'A구역' : 'B구역'} 종료 중...`);
              setDeviceStates(p => ({...p, irrigate: false}));
              await sleep(1000); if (!isRunningRef.current) break;
              setDeviceStates(p => { const np = {...p}; Reflect.set(np, zone, false); return np; });
              await sleep(1000); if (!isRunningRef.current) break;
              setDeviceStates(p => ({...p, nutA:false, nutB:false, nutC:false, nutD:false, mixer:false}));
              if(zone === 'zoneA' && isRunningRef.current) { setStatusMsg("B구역 전환 대기 중 (2초)..."); await sleep(2000); }
            }
            if (isRunningRef.current) {
              setIrrigationCount(c => c + 1); isRunningRef.current = false; setIsRunning(false);
              setStatusMsg("모든 구역 관수 완료 (DB 기록 저장됨)"); setTimeLeft(0);
            } else {
              setDeviceStates({supply:false, irrigate:false, mixer:false, nutA:false, nutB:false, nutC:false, nutD:false, zoneA:false, zoneB:false}); setTimeLeft(0);
            }
          };

          const ManualBtn = ({ id, label, activeColor, isSmall }) => (
            <button
              onClick={() => toggleDeviceManual(id)}
              className={`${isSmall ? 'py-2 px-3 text-xs' : 'py-4 px-6 text-sm'} w-full rounded-2xl border font-black transition-all shadow-sm ${Reflect.get(deviceStates, id) ? `${activeColor} border-white text-white shadow-md` : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}
            >
              {label}
            </button>
          );

          const TimerControl = ({ id }) => (
            <div className="flex flex-col items-center justify-center w-full bg-white border border-slate-200 p-2 rounded-xl shadow-sm mt-3">
              {Reflect.get(activeTimers, id) > 0 ? (
                <div className="text-xs font-black text-rose-500 w-full text-center py-1 animate-pulse">
                  {Math.floor(Reflect.get(activeTimers, id)/60)}분 {String(Reflect.get(activeTimers, id)%60).padStart(2,'0')}초 가동중
                </div>
              ) : (
                <div className="flex w-full gap-1">
                  <input
                    type="number"
                    value={Reflect.get(manualTimerInputs, id)}
                    onChange={e=>setManualTimerInputs(prev => { const np = {...prev}; Reflect.set(np, id, e.target.value); return np; })}
                    className="w-full text-center text-xs font-bold focus:outline-none text-slate-600 bg-slate-50 border border-slate-200 rounded p-1"
                    style={{minWidth: '40px'}}
                    placeholder="분"
                  />
                  <button
                    onClick={()=>startManualTimer(id)}
                    className="w-full bg-emerald-100 border border-emerald-200 text-emerald-700 font-bold px-1 py-1.5 rounded hover:bg-emerald-500 hover:text-white transition-colors whitespace-nowrap"
                    style={{minWidth: '60px', fontSize: '10px'}}
                  >
                    타이머 가동
                  </button>
                </div>
              )}
            </div>
          );

          return (
            <div className="h-full flex flex-col overflow-hidden bg-slate-50">
              <PageHeader title="💧 관수 제어" onChangeView={onChangeView} currentView="irrigation" onLogout={onLogout} />

              <div className="flex-grow overflow-y-auto no-scrollbar pb-10 flex flex-col gap-6">
                <div className="bg-white border border-emerald-100 p-6 rounded-3xl shadow-sm flex flex-col gap-6 overflow-x-auto no-scrollbar">
                  <h3 className="text-emerald-600 font-bold text-sm shrink-0">🛠️ 개별 기기 수동 조작 (Schematic View)</h3>

                  <div className="flex flex-col lg:flex-row items-center lg:items-stretch justify-center gap-4 lg:gap-2 p-4 bg-slate-50 rounded-2xl border border-slate-200" style={{minWidth: '700px'}}>

                    <div className="flex flex-col items-center justify-center bg-white p-4 rounded-2xl shadow-sm border border-blue-100 w-48">
                       <span className="font-black text-blue-400 mb-3" style={{fontSize: '10px'}}>1. WATER SUPPLY</span>
                       <ManualBtn id="supply" label="급수펌프" activeColor="bg-blue-500" />
                       <TimerControl id="supply" />
                    </div>

                    <div className="flex items-center justify-center text-slate-300 text-2xl font-black px-2 rotate-90 lg:rotate-0">▶</div>

                    <div className="flex flex-col items-center justify-center bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 w-72">
                       <span className="font-black text-indigo-400 mb-3" style={{fontSize: '10px'}}>2. MIXING TANK & NUTRIENTS</span>
                       <div className="flex gap-2 w-full mb-4">
                          <ManualBtn id="nutA" label="A" activeColor="bg-rose-500" isSmall />
                          <ManualBtn id="nutB" label="B" activeColor="bg-amber-500" isSmall />
                          <ManualBtn id="nutC" label="C" activeColor="bg-yellow-400" isSmall />
                          <ManualBtn id="nutD" label="D" activeColor="bg-emerald-500" isSmall />
                       </div>
                       <ManualBtn id="mixer" label="교반기" activeColor="bg-indigo-500" />
                       <TimerControl id="mixer" />
                    </div>

                    <div className="flex items-center justify-center text-slate-300 text-2xl font-black px-2 rotate-90 lg:rotate-0">▶</div>

                    <div className="flex flex-col items-center justify-start bg-white p-4 rounded-2xl shadow-sm border border-teal-100 w-56">
                       <span className="font-black text-teal-400 mb-3" style={{fontSize: '10px'}}>3. IRRIGATION ZONES</span>
                       <ManualBtn id="irrigate" label="관수펌프" activeColor="bg-teal-500" />
                       <TimerControl id="irrigate" />
                       <div className="w-full h-px bg-slate-200 my-4"></div>
                       <div className="flex gap-3 w-full">
                          <ManualBtn id="zoneA" label="A구역 밸브" activeColor="bg-orange-500" isSmall />
                          <ManualBtn id="zoneB" label="B구역 밸브" activeColor="bg-orange-500" isSmall />
                       </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white border border-teal-200 p-6 rounded-3xl shadow-md flex flex-col gap-6 relative overflow-hidden shrink-0">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-teal-50 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                  <h3 className="text-teal-700 font-black text-lg flex justify-between items-center relative z-10">
                    <span>🤖 1회 관수 프로그램 설정</span>
                    <span className="text-xs text-slate-500 font-bold bg-slate-100 px-3 py-1 rounded-full">금일 관수: <span className="text-teal-600">{irrigationCount}회</span></span>
                  </h3>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm">
                      <label className="text-xs text-slate-600 font-bold block mb-3">1. 작동 시간 (초)</label>
                      <div className="flex gap-2">
                        <input type="number" value={autoSettings.duration} onChange={e => setAutoSettings({...autoSettings, duration: e.target.value})} disabled={isRunningRef.current} className="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-teal-600 font-black text-center focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 shadow-inner" />
                        <button onClick={() => setAutoSettings({...autoSettings, duration: 60})} disabled={isRunningRef.current} className="px-4 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-100 shadow-sm whitespace-nowrap">1분</button>
                        <button onClick={() => setAutoSettings({...autoSettings, duration: 600})} disabled={isRunningRef.current} className="px-4 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-100 shadow-sm whitespace-nowrap">10분</button>
                      </div>
                    </div>

                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm">
                      <label className="text-xs text-slate-600 font-bold block mb-4">2. 양액 선택</label>
                      <div className="grid grid-cols-4 gap-3 h-[46px]">
                        {Array.of('A', 'B', 'C', 'D').map(nut => {
                          const key = `useNut${nut}`; const isActive = Reflect.get(autoSettings, key); const colorMap = {'A':'bg-rose-500', 'B':'bg-amber-500', 'C':'bg-yellow-400', 'D':'bg-emerald-500'};
                          return (<button key={nut} onClick={() => { if(!isRunningRef.current) setAutoSettings(p=>{const np={...p}; Reflect.set(np, key, !isActive); return np;}) }} style={{fontSize: '12px'}} className={`rounded-xl font-black border transition-all shadow-sm ${isActive ? `${Reflect.get(colorMap, nut)} border-white text-white shadow-md` : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50 hover:text-slate-600'}`}>양액 {nut}</button>);
                        })}
                      </div>
                    </div>
                  </div>

                  <div className="mt-2 relative z-10">
                    <div className="flex justify-between items-center mb-2"><span className="text-sm font-bold text-teal-600 bg-teal-50 px-3 py-1 rounded-full border border-teal-100">{statusMsg}</span><span className="text-3xl font-black text-slate-700">{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</span></div>
                    <div className="h-5 bg-slate-200 rounded-full border border-slate-300 overflow-hidden shadow-inner"><div className="h-full bg-teal-500 transition-all duration-1000" style={{width:`${(timeLeft/autoSettings.duration)*100}%`}}></div></div>
                  </div>

                  <button onClick={runSequence} className={`w-full py-5 rounded-2xl font-black text-xl transition-all shadow-lg active:scale-95 relative z-10 ${isRunning ? 'bg-rose-500 text-white shadow-rose-500/40 hover:bg-rose-600' : 'bg-teal-500 text-white shadow-teal-500/40 hover:bg-teal-600'}`}>
                    {isRunning ? "■ 시스템 강제 정지" : "▶ 1회 관수 시작"}
                  </button>
                </div>

              </div>
            </div>
          );
        };

        const DataAnalysisView = ({ onChangeView, onLogout, farmSettings }) => {
          // ... (데이터 분석 부분은 화면 용량상 모니터링/환경제어/관수제어 기능까지만 먼저 통합하여 표시합니다) ...
          return (
            <div className="p-10 text-center bg-slate-50 h-screen flex flex-col justify-center items-center">
              <h2 className="text-3xl font-bold mb-4 text-slate-700">📈 데이터 분석 모듈 로딩 중...</h2>
              <p className="text-slate-500 mb-6">수많은 생육 데이터베이스와 연동을 준비하고 있습니다.</p>
              <button onClick={()=>onChangeView('home')} className="mt-4 px-6 py-3 font-bold bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl shadow-md transition-all">메인 화면으로 돌아가기</button>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 만약 여기까지 무사히 도착했다면 에러 로딩 화면을 숨깁니다!
        document.getElementById('root').querySelector('div[style*="padding: 50px"]').style.display = 'none';
        {% endraw %}
    </script>
</body>
</html>
