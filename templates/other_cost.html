<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기타비용 - 영농일지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.table-responsive { font-size: 0.8rem; } .table th { background-color: #f8f9fa; }</style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm mb-3">
  <div class="container" style="max-width: 800px;">
    <a href="/" class="navbar-brand mb-0 h4 fw-bold text-decoration-none"><span class="fs-4 me-1">⬅️</span> 기타비용 관리</a>
    <a href="/export_other_cost" class="btn btn-sm btn-outline-light fw-bold">📥 엑셀 다운</a>
  </div>
</nav>

<div class="container mb-5" style="max-width: 800px;">
    <div class="card shadow-sm mb-4 border-0 bg-primary text-white">
        <div class="card-body text-center py-3"><h6 class="mb-1 opacity-75">💳 기타비용 총 누적액</h6><h3 class="fw-bold m-0">{{ "{:,.0f}".format(total_cost) }} 원</h3></div>
    </div>

    <div class="card shadow-sm mb-4 border-0">
        <div class="card-header bg-white pt-3 border-0"><h6 class="fw-bold m-0 text-dark">➕ 농자재 및 기타 내역 등록</h6></div>
        <div class="card-body bg-white rounded">
            <form action="/add_other_cost" method="post">
                <div class="row mb-2 g-2">
                    <div class="col-4"><label class="form-label small text-muted mb-1">월.일</label><input type="date" class="form-control" name="date" required id="todayDate"></div>
                    <div class="col-8"><label class="form-label small text-muted mb-1">농자재명 (항목)</label><input type="text" class="form-control border-primary" name="material_name" placeholder="예: 비닐, 지주대, 끈 등" required></div>
                </div>
                <div class="row mb-2 g-2">
                    <div class="col-6">
                        <label class="form-label small text-muted mb-1">수량</label>
                        <div class="input-group">
                            <input type="number" step="any" class="form-control" name="quantity" required>
                            <select class="form-select bg-light" name="unit" style="max-width: 80px;" required>
                                <option value="박스">박스</option><option value="롤">롤</option><option value="Kg">Kg</option><option value="개">개</option><option value="기타">기타</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6"><label class="form-label small text-muted mb-1">금액 (원)</label><input type="number" class="form-control fw-bold border-danger" name="cost" required></div>
                </div>
                <div class="row mb-3 g-2">
                    <div class="col-6"><label class="form-label small text-muted mb-1">교체주기</label><input type="text" class="form-control bg-light" name="replace_cycle" placeholder="예: 1년, 매번"></div>
                    <div class="col-6">
                        <label class="form-label small text-muted mb-1">작목 부담비율(%)</label>
                        <div class="input-group"><input type="number" class="form-control bg-light" name="burden_ratio" placeholder="예: 100"><span class="input-group-text">%</span></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold shadow-sm py-2">등록하기</button>
            </form>
        </div>
    </div>

    <h6 class="text-secondary fw-bold mb-3">📋 상세 내역</h6>
    <div class="table-responsive bg-white shadow-sm rounded border">
        <table class="table table-hover align-middle text-center mb-0">
            <thead><tr class="text-muted text-nowrap"><th>날짜/품명</th><th>수량/금액</th><th>주기/비율</th><th>관리</th></tr></thead>
            <tbody>
                {% for rec in records %}
                <tr>
                    <td><strong class="text-secondary">{{ rec[2] }}</strong><br><span class="text-dark fw-bold">{{ rec[3] }}</span></td>
                    <td>{{ rec[4] }} {{ rec[5] }}<br><strong class="text-danger">{{ "{:,.0f}".format(rec[6]) }}원</strong></td>
                    <td><span class="small text-muted">주기: {{ rec[7] }}</span><br><span class="badge bg-primary bg-opacity-10 text-primary border">{{ rec[8] }}%</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary py-0 px-2 w-100 mb-1" onclick="openEditModal('{{ rec[0] }}', '{{ rec[2] }}', '{{ rec[3] }}', '{{ rec[4] }}', '{{ rec[5] }}', '{{ rec[6] }}', '{{ rec[7] }}', '{{ rec[8] }}')">수정</button>
                        <a href="/delete/other_cost/{{ rec[0] }}" class="btn btn-sm btn-outline-danger py-0 px-2 w-100" onclick="return confirm('삭제하시겠습니까?');">삭제</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0" style="border-radius: 15px;">
        <div class="modal-header bg-dark text-white py-2"><h6 class="modal-title fw-bold">내역 수정</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-3">
            <form action="/edit_other_cost" method="post"><input type="hidden" name="id" id="e_id">
                <div class="row mb-2 g-2">
                    <div class="col-4"><input type="date" class="form-control" name="date" id="e_date" required></div>
                    <div class="col-8"><input type="text" class="form-control" name="material_name" id="e_name" required></div>
                </div>
                <div class="row mb-2 g-2">
                    <div class="col-6">
                        <div class="input-group">
                            <input type="number" step="any" class="form-control" name="quantity" id="e_qty" required>
                            <select class="form-select bg-light" name="unit" id="e_unit" style="max-width: 80px;" required>
                                <option value="박스">박스</option><option value="롤">롤</option><option value="Kg">Kg</option><option value="개">개</option><option value="기타">기타</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6"><input type="number" class="form-control" name="cost" id="e_cost" required></div>
                </div>
                <div class="row mb-3 g-2">
                    <div class="col-6"><input type="text" class="form-control bg-light" name="replace_cycle" id="e_cycle" placeholder="교체주기"></div>
                    <div class="col-6"><div class="input-group"><input type="number" class="form-control bg-light" name="burden_ratio" id="e_ratio" placeholder="부담비율"><span class="input-group-text">%</span></div></div>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold">수정 완료</button>
            </form>
        </div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('todayDate').valueAsDate = new Date();
    function openEditModal(id, date, name, qty, unit, cost, cycle, ratio) {
        document.getElementById('e_id').value = id; document.getElementById('e_date').value = date;
        document.getElementById('e_name').value = name; document.getElementById('e_qty').value = qty;
        
        let unitSelect = document.getElementById('e_unit');
        let optionExists = false;
        for (let i=0; i<unitSelect.options.length; i++) { if (unitSelect.options[i].value === unit) { optionExists = true; break; } }
        if (!optionExists) { unitSelect.innerHTML += `<option value="${unit}">${unit}</option>`; }
        unitSelect.value = unit;
        
        document.getElementById('e_cost').value = cost;
        document.getElementById('e_cycle').value = (cycle !== 'None') ? cycle : '';
        document.getElementById('e_ratio').value = ratio;
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }
</script>
</body>
</html>
