<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영농 기타 메모장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .memo-content { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4" style="background-color: #ffc107;">
  <div class="container" style="max-width: 800px;">
    <a href="/" class="navbar-brand mb-0 h4 fw-bold text-dark text-decoration-none">
        <span class="fs-4 me-1">⬅️</span> 📝 영농 기타 메모장
    </a>
  </div>
</nav>

<div class="container mb-5" style="max-width: 800px;">
    
    <div class="card shadow-sm mb-4 border-0 border-top border-warning border-3">
        <div class="card-body bg-white rounded">
            <form action="/add_memo" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">날짜</label>
                    <input type="date" class="form-control border-warning" name="date" required id="todayDate">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">메모 내용</label>
                    <textarea class="form-control" name="content" rows="4" placeholder="오늘 농장에 있었던 특별한 이벤트나 잊지 말아야 할 사항을 적어두세요." required></textarea>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold text-dark shadow-sm">메모 저장하기</button>
            </form>
        </div>
    </div>

    <h6 class="fw-bold text-secondary mb-3 px-1">최근 작성한 메모</h6>
    {% if not records %}
        <div class="text-center text-muted py-4">아직 작성된 메모가 없습니다.</div>
    {% endif %}
    
    {% for rec in records %}
    <div class="card shadow-sm mb-3 border-0">
        <div class="card-header bg-light d-flex justify-content-between align-items-center py-2">
            <span class="fw-bold text-dark">📅 {{ rec[2] }}</span>
            <div>
                <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="openEditMemoModal('{{ rec[0] }}', '{{ rec[2] }}', `{{ rec[3] | replace('\n', '\\n') | replace('`', '\\`') }}`)">수정</button>
                <a href="/delete/memo/{{ rec[0] }}" class="btn btn-sm btn-outline-danger py-0 px-2" onclick="return confirm('이 메모를 삭제하시겠습니까?');">삭제</a>
            </div>
        </div>
        <div class="card-body">
            <div class="memo-content text-dark">{{ rec[3] }}</div>
        </div>
    </div>
    {% endfor %}

</div>

<div class="modal fade" id="editMemoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning py-2">
                <h6 class="modal-title fw-bold text-dark">메모 수정</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form action="/edit_memo" method="post">
                    <input type="hidden" name="id" id="edit_memo_id">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">날짜</label>
                        <input type="date" class="form-control" name="date" id="edit_memo_date" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">메모 내용</label>
                        <textarea class="form-control" name="content" id="edit_memo_content" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning text-dark w-100 fw-bold">수정 완료</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('todayDate').valueAsDate = new Date();

    function openEditMemoModal(id, date, content) {
        document.getElementById('edit_memo_id').value = id;
        document.getElementById('edit_memo_date').value = date;
        document.getElementById('edit_memo_content').value = content;
        new bootstrap.Modal(document.getElementById('editMemoModal')).show();
    }
</script>
</body>
</html>
