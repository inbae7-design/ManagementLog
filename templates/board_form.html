<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성 - 스마트 영농일지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f3; color: #333; }
        .navbar-custom { background-color: #2e4d2e; border-bottom: 2px solid #1a2f1a; }
    </style>
</head>
<body>

<nav class="navbar-custom py-2 mb-4 shadow-sm">
  <div class="container" style="max-width: 800px;">
    <a href="/board" class="text-light text-decoration-none fw-bold fs-5">
        <span class="me-1">⬅️</span> {% if post %}게시글 수정{% else %}새 게시글 작성{% endif %}
    </a>
  </div>
</nav>

<div class="container mb-5" style="max-width: 800px;">
    <div class="card shadow-sm border-0 border-top border-success border-3">
        <div class="card-body bg-white rounded p-4">
            <form action="{% if post %}/board_edit/{{ post[0] }}{% else %}/board_write{% endif %}" method="post">
                
                <div class="form-check form-switch mb-3 p-3 bg-danger bg-opacity-10 rounded border border-danger border-opacity-25">
                  <input class="form-check-input ms-0 me-2" type="checkbox" id="is_notice" name="is_notice" {% if post and post[4] %}checked{% endif %} style="transform: scale(1.2);">
                  <label class="form-check-label fw-bold text-danger" for="is_notice" style="padding-top: 1px;">📢 이 글을 공지사항으로 최상단에 고정합니다.</label>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-success small">제목</label>
                    <input type="text" class="form-control fw-bold" name="title" value="{{ post[2] if post else '' }}" placeholder="게시글 제목을 입력하세요" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-success small">내용</label>
                    <textarea class="form-control" name="content" rows="10" placeholder="연구회 회원분들과 나눌 이야기를 자세히 작성해 주세요" required>{{ post[3] if post else '' }}</textarea>
                </div>
                
                <button type="submit" class="btn btn-success w-100 fw-bold py-2 fs-5 shadow-sm rounded-pill">
                    {% if post %}수정 완료{% else %}게시글 등록{% endif %}
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
