<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 글쓰기 - 스마트 영농일지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f3; color: #333; padding-bottom: 50px;}
        .navbar-custom { background-color: #2e4d2e; border-bottom: 2px solid #1a2f1a; }
    </style>
</head>
<body>
<nav class="navbar-custom py-2 mb-4 shadow-sm">
  <div class="container text-center">
    <span class="text-light fw-bold fs-5">🛒 공동구매 {{ '수정' if post else '등록' }}</span>
  </div>
</nav>

<div class="container" style="max-width: 800px;">
    <div class="card border-0 shadow-sm" style="border-radius: 12px;">
        <div class="card-body p-4">
            
            <form action="{{ '/group_purchase_edit/' ~ post.0 if post else '/group_purchase_write' }}" method="POST" onsubmit="return packItems()">
                
                <input type="hidden" name="items_json" id="hidden_items_json">

                <div class="mb-3">
                    <label class="form-label fw-bold">제목</label>
                    <input type="text" name="title" class="form-control" placeholder="예: [특가] 오이 지주대 공동구매 진행합니다" value="{{ post.1 if post else '' }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-success">진행 상태</label>
                    <select name="status" class="form-select fw-bold">
                        <option value="진행중" class="text-success" {{ 'selected' if post and post.4 == '진행중' else '' }}>🟢 진행중 (신청 가능)</option>
                        <option value="마감" class="text-secondary" {{ 'selected' if post and post.4 == '마감' else '' }}>⚪ 마감 (신청 불가)</option>
                    </select>
                </div>

                <div class="mb-3 p-3 bg-light rounded border">
                    <label class="form-label fw-bold text-primary mb-1">📦 판매 품목(옵션) 등록</label>
                    <div class="small text-muted mb-2">회원들이 선택할 품목을 하나씩 적어주세요.</div>
                    <div id="items-container">
                        {% for item in post_items %}
                        <div class="input-group input-group-sm mb-2">
                            <input type="text" class="form-control my-item-input" value="{{ item }}" placeholder="예: 오이지주대 1m" required>
                            <button type="button" class="btn btn-outline-danger fw-bold" onclick="this.parentElement.remove()">X</button>
                        </div>
                        {% else %}
                        <div class="input-group input-group-sm mb-2">
                            <input type="text" class="form-control my-item-input" placeholder="예: 오이지주대 1m" required>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-primary w-100" onclick="addItem()">+ 품목 입력칸 추가</button>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">상세 내용 (가격, 수령방법 등)</label>
                    <textarea name="content" class="form-control" rows="10" placeholder="단가, 최소 신청 수량, 수령 장소 및 날짜 등을 자세히 적어주세요." required>{{ post.3 if post else '' }}</textarea>
                </div>
                
                <div class="d-flex justify-content-between">
                    <button type="button" class="btn btn-secondary fw-bold px-4" onclick="history.back()">취소</button>
                    <button type="submit" class="btn btn-success fw-bold px-5">{{ '수정완료' if post else '등록하기' }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function addItem() {
        const container = document.getElementById('items-container');
        const div = document.createElement('div');
        div.className = 'input-group input-group-sm mb-2';
        div.innerHTML = '<input type="text" class="form-control my-item-input" placeholder="추가 품목 입력" required><button type="button" class="btn btn-outline-danger fw-bold" onclick="this.parentElement.remove()">X</button>';
        container.appendChild(div);
    }

    // ✨ 마법의 보따리 함수: 제출 직전에 모든 품목을 묶어서 숨김 칸에 넣습니다.
    function packItems() {
        const inputs = document.querySelectorAll('.my-item-input');
        const items = [];
        inputs.forEach(inp => {
            if(inp.value.trim() !== '') items.push(inp.value.trim());
        });
        document.getElementById('hidden_items_json').value = JSON.stringify(items);
        return true;
    }
</script>
</body>
</html>
