<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 메뉴 - 스마트 영농일지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f3; color: #333; }
        .navbar-custom { background-color: #2e4d2e; border-bottom: 2px solid #1a2f1a; }
        .menu-card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; text-decoration: none; display: block; background-color: #fff;}
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .icon-wrapper { font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<nav class="navbar-custom py-3 mb-4 shadow-sm">
  <div class="container text-center">
    <a href="/" class="text-light text-decoration-none fw-bold fs-4"><span class="me-2">🏠</span>커뮤니티 메뉴</a>
  </div>
</nav>

<div class="container" style="max-width: 600px; padding-bottom: 40px;">
    <div class="row g-3">

        <div class="col-12">
            <a href="/board" class="menu-card p-4 text-center border-primary" style="border-left: 6px solid #0d6efd; background-color: #f8fbff;">
                <div class="icon-wrapper mb-2">📢</div>
                <h5 class="fw-bold text-dark m-0 mb-1">연구회 게시판</h5>
                <small class="text-muted fw-bold">공지사항 및 농업 정보 공유</small>
            </a>
        </div>

        <div class="col-12">
            <a href="/group_purchase" class="menu-card p-4 text-center border-success" style="border-left: 6px solid #198754; background-color: #f8fff9;">
                <div class="icon-wrapper mb-2">🛒</div>
                <h5 class="fw-bold text-success m-0 mb-1">농자재 공동구매</h5>
                <small class="text-muted fw-bold">특가 자재 확인 및 참여 신청</small>
            </a>
        </div>

        <div class="col-12">
            <a href="/chat" class="menu-card p-4 text-center border-warning" style="border-left: 6px solid #ffc107; background-color: #fffdf5;">
                <div class="icon-wrapper mb-2">💬</div>
                <h5 class="fw-bold text-dark m-0 mb-1">실시간 소통방</h5>
                <small class="text-muted fw-bold">연구회 회원 간 실시간 대화</small>
            </a>
        </div>

    </div>
</div>
</body>
</html>
