<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 방제 기록장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container" style="max-width: 400px;">
    <div class="card shadow border-0">
        <div class="card-body p-4 text-center">
            <h4 class="fw-bold mb-4">새 계정 만들기</h4>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger py-2">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}
            <form action="/register" method="post">
                <input type="text" class="form-control mb-3" name="username" placeholder="사용할 아이디" required>
                <input type="password" class="form-control mb-3" name="password" placeholder="비밀번호 (아무거나)" required>
                <button type="submit" class="btn btn-dark w-100 fw-bold mb-3">가입 완료</button>
            </form>
            <a href="/login" class="text-secondary text-decoration-none">로그인 화면으로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
